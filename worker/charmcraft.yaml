name: loki-worker-k8s
type: charm
summary: Loki for Kubernetes clusters.
description: |
  `loki-worker-k8s` is a charm for [Loki].
  It is an essential part of COS HA.


  This Charmed Operator handles deployment, scaling, configuration, and Day 2 operations specific to Loki.

  This operator drives the Loki worker applications, and it can be composed with other operators to deliver a complex application or service.


  The Loki worker charm manages a single instance of Loki, which can take various roles. The consistency of the various Loki workers and their roles is monitored by the [loki-coordinator][Loki coordinator operator] charm.


  This charm is:
  - part of the COS HA bundle
  - intended to be used together with [`alertmanager-k8s`][Alertmanager operator]


  [Loki]: https://grafana.com/oss/loki/
  [COS Lite bundle]: https://charmhub.io/cos-lite
  [Alertmanager operator]: https://charmhub.io/alertmanager-k8s
  [Loki coordinator operator]: https://charmhub.io/loki-coordinator-k8s

links:
  documentation: https://documentation.ubuntu.com/observability/track-2/
  website: https://charmhub.io/loki-worker-k8s
  source: https://github.com/canonical/loki-worker-k8s-operator
  issues: https://github.com/canonical/loki-worker-k8s-operator/issues

assumes:
  - k8s-api
  - juju >= 3.6

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]

containers:
  loki:
    resource: loki-image
    mounts:
      - storage: loki-persisted
        location: /loki/persisted

resources:
  loki-image:
    type: oci-image
    description: OCI image for Grafana Loki
    upstream-source: docker.io/ubuntu/loki@sha256:18de9c8e960ab258f468f424c4f35b39f57752640ad38d75007f12119e59a9af  # renovate: oci-image tag: 3.5-24.04

storage:
  loki-persisted:
    type: filesystem
    description: Mount point in which Loki will store data.

requires:
  loki-cluster:
    interface: loki_cluster
    optional: true
    limit: 1
    description: |
      Integrate with a coordinator charm to receive a config and be part 
      of a Loki HA cluster.


# Based on: https://grafana.com/docs/loki/latest/get-started/deployment-modes/#simple-scalable
config:
  options:
    role-read:
      type: boolean
      default: false
      description: |
        Enable the 'read' meta-role for Loki. This enables the following components:
        Query Frontend, Querier.
    role-write:
      type: boolean
      default: false
      description: |
        Enable the 'write' meta-role for Loki. This enables the following components:
        Distributor, Ingester.
    role-backend:
      type: boolean
      default: false
      description: |
        Enable the 'backend' meta-role for Loki. This enables the following components:
        Compactor, Index Gateway, Query Scheduler, Ruler.
    role-all:
      type: boolean
      default: false
      description: |
        Enables all the default roles for Loki.

