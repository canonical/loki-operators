name: loki-worker-k8s
type: charm
summary: Loki for Kubernetes clusters.
description: |
  Loki Worker K8s is a Juju charm that runs Grafana Loki components on Kubernetes as part of a
  horizontally scalable deployment. It works together with the Loki Coordinator charm, following
  the coordinated-workers pattern. It is a component of the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  Each worker unit receives its configuration from the coordinator and executes one or more Loki
  roles — read, write, backend, or all — enabling flexible scaling of individual components
  independently.

  Key features:

  - Configurable roles (read, write, backend, all) to run specific Loki components such as
    Query Frontend, Querier, Distributor, Ingester, Compactor, Index Gateway, and Ruler.
  - Horizontal scaling by adding more worker units with the desired role combination.
  - Automatic configuration received from the Loki Coordinator via the loki-cluster relation.
  - Persistent storage for Loki data across container restarts.

links:
  documentation: https://discourse.charmhub.io/t/loki-worker-k8s-operator-docs-index/15536
  website: https://charmhub.io/loki-worker-k8s
  source: https://github.com/canonical/loki-worker-k8s-operator
  issues: https://github.com/canonical/loki-worker-k8s-operator/issues

assumes:
  - k8s-api
  - juju >= 3.6

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]

containers:
  loki:
    resource: loki-image
    mounts:
      - storage: loki-persisted
        location: /loki/persisted

resources:
  loki-image:
    type: oci-image
    description: OCI image for Grafana Loki
    upstream-source: docker.io/ubuntu/loki@sha256:dfdf5a4db1116a9111e5222910a8d7b30a44f83a4a1f2d99d97af14c77c43ac8  # renovate: oci-image tag: 3.7-24.04
storage:
  loki-persisted:
    type: filesystem
    description: Mount point in which Loki will store data.

requires:
  loki-cluster:
    interface: loki_cluster
    optional: true
    limit: 1
    description: |
      Integrate with a coordinator charm to receive a config and be part 
      of a Loki HA cluster.


# Based on: https://grafana.com/docs/loki/latest/get-started/deployment-modes/#simple-scalable
config:
  options:
    role-read:
      type: boolean
      default: false
      description: |
        Enable the 'read' meta-role for Loki. This enables the following components:
        Query Frontend, Querier.
    role-write:
      type: boolean
      default: false
      description: |
        Enable the 'write' meta-role for Loki. This enables the following components:
        Distributor, Ingester.
    role-backend:
      type: boolean
      default: false
      description: |
        Enable the 'backend' meta-role for Loki. This enables the following components:
        Compactor, Index Gateway, Query Scheduler, Ruler.
    role-all:
      type: boolean
      default: false
      description: |
        Enables all the default roles for Loki.

